    <rect x="338" width="156" height="38" rx="19" fill="#E4BE66" opacity="0.15"/>
    <text x="416" y="25" fill="#F2D993" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="650" text-anchor="middle">
