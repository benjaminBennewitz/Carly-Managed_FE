    <rect x="180" width="144" height="38" rx="19" fill="#72A5C7" opacity="0.16"/>
    <text x="252" y="25" fill="#A9D1EA" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="650" text-anchor="middle">
