  </text>
  <rect x="303" y="171" width="475" height="4" rx="2" fill="url(#accentLine)"/>
  <text x="303" y="222" fill="#C7BBCF" font-family="Inter, Segoe UI, sans-serif" font-size="25" font-weight="550">
    Gemeinsam planen. Live zusammenarbeiten. Motiviert bleiben.
  </text>
  <text x="303" y="269" fill="#91849B" font-family="Inter, Segoe UI, sans-serif" font-size="19">
