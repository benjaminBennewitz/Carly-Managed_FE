<!-- src/app/features/members/pages/members-page/members-page.component.html -->

<section class="members-page">
  <cm-page-header
    eyebrow="Zusammenarbeit"
    title="Mitglieder"
    description="Personen, Rollen und Präsenz in deinen gemeinsamen Arbeitsbereichen."
  />

  <div class="members-page__list">
    @for (member of workspaceService.members(); track member.id) {
      <article
        class="members-page__member"
        [class.members-page__member--highlighted]="selectedMemberId() === member.id"
      >
        <span
          class="members-page__avatar"
          [style.background]="member.avatarColor"
          [style.color]="member.avatarTextColor"
          aria-hidden="true"
          >{{ member.initials }}</span
        >

        <div class="members-page__identity">
          <strong>{{ member.fullName }}</strong>
          <span>{{ member.email }}</span>
        </div>

        <span class="members-page__role">{{ getRoleLabel(member) }}</span>

        <span
          class="members-page__presence"
          [class.members-page__presence--offline]="!member.isOnline"
        >
          <span class="material-symbols-outlined" aria-hidden="true">circle</span>
          {{ member.isOnline ? 'Online' : 'Offline' }}
        </span>
      </article>
    }
  </div>
</section>
