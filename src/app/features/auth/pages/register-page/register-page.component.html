<!-- src/app/features/auth/pages/register-page/register-page.component.html -->

<article class="auth-card" aria-labelledby="register-title">
  <header class="auth-card__header">
    <a class="auth-card__back" routerLink="/auth/login">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      <span>Zur Anmeldung</span>
    </a>

    <div class="auth-card__header-copy">
      <p class="auth-card__eyebrow">Neues Konto</p>
      <h2 id="register-title">Carly Managed ausprobieren</h2>
      <p>Erstelle dein Konto und beginne mit deinem ersten Board.</p>
    </div>
  </header>

  @if (formError()) {
    <div class="auth-card__status" role="alert">
      <strong>Registrierung nicht möglich</strong>
      <p>{{ formError() }}</p>
    </div>
  }

  <form [formGroup]="form" novalidate (ngSubmit)="submit()">
    <cm-text-field
      [control]="form.controls.displayName"
      inputId="register-display-name"
      label="Anzeigename"
      autocomplete="name"
      placeholder="Dein Anzeigename"
      [required]="true"
      [submitted]="submitted()"
      [maxlength]="60"
    />

    <cm-text-field
      [control]="form.controls.email"
      inputId="register-email"
      label="E-Mail-Adresse"
      type="email"
      autocomplete="email"
      placeholder="name@beispiel.de"
      [required]="true"
      [submitted]="submitted()"
      [maxlength]="254"
    />

    <cm-text-field
      [control]="form.controls.password"
      inputId="register-password"
      label="Passwort"
      type="password"
      autocomplete="new-password"
      placeholder="Mindestens 12 Zeichen"
      [required]="true"
      [submitted]="submitted()"
      [allowPasswordToggle]="true"
      [maxlength]="128"
    />

    <cm-text-field
      [control]="form.controls.passwordConfirmation"
      inputId="register-password-confirmation"
      label="Passwort wiederholen"
      type="password"
      autocomplete="new-password"
      placeholder="Passwort erneut eingeben"
      [required]="true"
      [submitted]="submitted()"
      [allowPasswordToggle]="true"
      [maxlength]="128"
    />

    <div
      class="password-meter"
      role="status"
      aria-live="polite"
      [attr.aria-label]="passwordStrengthLabel()"
    >
      @for (segment of [1, 2, 3, 4]; track segment) {
        <span [class.password-meter__segment--active]="passwordScore() >= segment"></span>
      }
    </div>

    <div class="auth-card__privacy">
      <cm-checkbox-field
        [control]="form.controls.privacyAcknowledged"
        inputId="privacy-acknowledged"
        label="Ich habe die Datenschutzerklärung zur Kenntnis genommen."
        error="Bitte bestätige die Datenschutzerklärung, um fortzufahren."
        [submitted]="submitted()"
      />
      <a routerLink="/datenschutz">
        <span>Datenschutzerklärung öffnen</span>
        <span class="material-symbols-outlined" aria-hidden="true">arrow_outward</span>
      </a>
    </div>

    <button class="auth-card__submit" type="submit" [disabled]="pending()">
      @if (pending()) {
        <span>Konto wird erstellt …</span>
      } @else {
        <span>Konto erstellen</span>
        <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
      }
    </button>
  </form>
</article>
