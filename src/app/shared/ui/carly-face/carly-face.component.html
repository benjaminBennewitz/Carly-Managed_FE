<!-- src/app/shared/ui/carly-face/carly-face.component.html -->

<div
  class="carly-face"
  [class.carly-face--sleeping]="sleeping()"
  [class.carly-face--petted]="petted()"
  [class.carly-face--large]="large()"
  [attr.data-reduced]="reduced()"
  aria-hidden="true"
>
  <div class="cat">
    <span class="ear ear--left"></span>
    <span class="ear ear--right"></span>
    <div class="face">
      <span class="eye eye--left"><i class="eye-pupil"></i></span>
      <span class="eye eye--right"><i class="eye-pupil"></i></span>
      <span class="muzzle"></span>
    </div>
  </div>

  @if (sleeping()) {
    <span class="sleeping-zs"><span>Z</span><span>Z</span><span>Z</span></span>
  }

  @if (petted()) {
    <span class="heart-container"><span>❤️</span><span>❤️</span><span>❤️</span></span>
  }
</div>
