<!-- src/app/shared/ui/forms/text-field/text-field.component.html -->

<div
  class="text-field"
  [class.text-field--invalid]="isInvalid()"
  [class.text-field--confirmed]="isConfirmed()"
>
  <label class="text-field__label" [for]="inputId()">
    <span>{{ label() }}</span>
    @if (required()) {
      <span class="text-field__required" aria-hidden="true">erforderlich</span>
    }
  </label>

  <div class="text-field__control">
    <input
      [id]="inputId()"
      [formControl]="control()"
      [type]="resolvedType()"
      [autocomplete]="autocomplete()"
      [placeholder]="placeholder()"
      [attr.maxlength]="maxlength()"
      [attr.aria-describedby]="describedBy()"
      [attr.aria-errormessage]="isInvalid() ? inputId() + '-error' : null"
      [attr.aria-invalid]="isInvalid()"
      [attr.aria-required]="required()"
      spellcheck="false"
    />

    @if (allowPasswordToggle() && type() === 'password') {
      <button
        class="text-field__toggle"
        type="button"
        [attr.aria-label]="passwordVisible() ? 'Passwort ausblenden' : 'Passwort anzeigen'"
        [attr.aria-pressed]="passwordVisible()"
        (click)="togglePasswordVisibility()"
      >
        <span class="material-symbols-outlined" aria-hidden="true">
          {{ passwordVisible() ? 'visibility_off' : 'visibility' }}
        </span>
      </button>
    }

    @if (isConfirmed()) {
      <span
        class="material-symbols-outlined text-field__status-icon"
        aria-hidden="true"
      >
        check_circle
      </span>
    }
  </div>

  @if (isInvalid()) {
    <p
      class="text-field__message text-field__message--error"
      [id]="inputId() + '-error'"
      role="alert"
    >
      <span class="material-symbols-outlined" aria-hidden="true">error</span>
      <span>{{ errorMessage() }}</span>
    </p>
  }
</div>
