<!-- src/app/shared/ui/forms/text-field/text-field.component.html -->

<div
  class="text-field"
  [class.text-field--invalid]="isInvalid()"
  [class.text-field--confirmed]="isConfirmed()"
>
  <label class="text-field__label" [for]="inputId()">
    <span>{{ label() }}</span>
    @if (required()) {
      <span class="text-field__required" aria-hidden="true">erforderlich</span>
    }
  </label>

  <div class="text-field__control">
    <input
      [id]="inputId()"
      [formControl]="control()"
      [type]="resolvedType()"
      [autocomplete]="autocomplete()"
      [placeholder]="placeholder()"
      [attr.inputmode]="type() === 'email' ? 'email' : null"
      [attr.autocapitalize]="type() === 'email' ? 'none' : null"
      [attr.maxlength]="maxlength()"
      [attr.aria-describedby]="describedBy()"
      [attr.aria-errormessage]="isInvalid() ? inputId() + '-error' : null"
      [attr.aria-invalid]="isInvalid()"
      [attr.aria-required]="required()"
      spellcheck="false"
    />

    @if (allowPasswordToggle() && type() === 'password') {
      <button
        class="text-field__toggle"
        type="button"
        [attr.aria-label]="passwordVisible() ? 'Passwort ausblenden' : 'Passwort anzeigen'"
        [attr.aria-pressed]="passwordVisible()"
        (click)="togglePasswordVisibility()"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          @if (passwordVisible()) {
            <path
              d="M3 3l18 18M10.6 10.7a2 2 0 0 0 2.7 2.7M9.9 4.2A10.8 10.8 0 0 1 12 4c5.5 0 9 5.5 9 8a9.5 9.5 0 0 1-2.2 3.5M6.6 6.7C4.3 8.2 3 10.5 3 12c0 2.5 3.5 8 9 8 1.3 0 2.5-.3 3.5-.7"
            />
          } @else {
            <path
              d="M3 12c0-2.5 3.5-8 9-8s9 5.5 9 8-3.5 8-9 8-9-5.5-9-8Zm9 3a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
            />
          }
        </svg>
      </button>
    }

    @if (isConfirmed()) {
      <svg class="text-field__status-icon" aria-hidden="true" viewBox="0 0 24 24">
        <path d="m6.8 12.5 3.2 3.2 7.2-7.4" />
      </svg>
    }
  </div>

  @if (isInvalid()) {
    <p
      class="text-field__message text-field__message--error"
      [id]="inputId() + '-error'"
      role="alert"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M12 8v5M12 17.2v.1M12 3.5 21 20H3L12 3.5Z" />
      </svg>
      <span>{{ errorMessage() }}</span>
    </p>
  }
</div>
