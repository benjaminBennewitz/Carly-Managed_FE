<!-- src/app/shared/ui/select-menu/select-menu.component.html -->

<div
  class="ui-select"
  [class.ui-select--compact]="compact()"
  [class.ui-select--active]="active()"
  [class.ui-select--open]="open()"
>
  <span class="ui-select__label">{{ label() }}</span>

  <button
    class="ui-select__trigger"
    type="button"
    [disabled]="disabled()"
    [attr.aria-expanded]="open()"
    aria-haspopup="listbox"
    (click)="toggle()"
  >
    <span class="ui-select__value">
      @if (selectedOption(); as selected) {
        @if (selected.color) {
          <span
            class="ui-select__swatch"
            [style.--select-option-color]="selected.color"
            aria-hidden="true"
          ></span>
        }
        @if (selected.icon) {
          <span class="material-symbols-outlined" aria-hidden="true">
            {{ selected.icon }}
          </span>
        }
        <span>{{ selected.label }}</span>
      } @else {
        <span class="ui-select__placeholder">{{ placeholder() }}</span>
      }
    </span>

    <span class="material-symbols-outlined ui-select__chevron" aria-hidden="true">
      expand_more
    </span>
  </button>

  @if (open()) {
    <div class="ui-select__menu" role="listbox" [attr.aria-label]="label()">
      @for (option of options(); track option.value) {
        <button
          class="ui-select__option"
          type="button"
          role="option"
          [class.ui-select__option--selected]="option.value === value()"
          [attr.aria-selected]="option.value === value()"
          (click)="selectOption(option)"
        >
          @if (option.color) {
            <span
              class="ui-select__swatch"
              [style.--select-option-color]="option.color"
              aria-hidden="true"
            ></span>
          }
          @if (option.icon) {
            <span class="material-symbols-outlined" aria-hidden="true">
              {{ option.icon }}
            </span>
          }
          <span class="ui-select__option-copy">
            <strong>{{ option.label }}</strong>
            @if (option.description) {
              <small>{{ option.description }}</small>
            }
          </span>
          @if (option.value === value()) {
            <span class="material-symbols-outlined ui-select__check" aria-hidden="true">
              check
            </span>
          }
        </button>
      }
    </div>
  }
</div>
